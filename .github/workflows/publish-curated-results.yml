name: Publish curated timing tables

on:
  workflow_dispatch:
    inputs:
      results_glob:
        description: 'Glob for curated audit JSON files to summarize'
        required: false
        default: 'results/curated/*.json'
      commit_message:
        description: 'Commit message for generated tables'
        required: false
        default: 'Update curated timing audit tables'
  push:
    branches: [ main, master ]
    paths:
      - 'results/curated/*.json'
      - 'results/curated/**/*.json'

permissions:
  contents: write

jobs:
  publish-curated-tables:
    name: Generate and commit curated timing tables
    runs-on: ubuntu-latest

    env:
      RESULTS_GLOB: ${{ github.event.inputs.results_glob || 'results/curated/*.json' }}
      COMMIT_MESSAGE: ${{ github.event.inputs.commit_message || 'Update curated timing audit tables' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Check curated JSON inputs
        shell: bash
        run: |
          shopt -s nullglob globstar
          files=( $RESULTS_GLOB )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No curated JSON files matched: $RESULTS_GLOB"
            echo "Add JSON audit results under results/curated/ or run workflow_dispatch with a different glob."
            exit 1
          fi
          printf 'Found %d curated result files:\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"

      - name: Generate curated summary tables
        run: |
          mkdir -p tables
          python -m dataset_time_auditor.summarize "$RESULTS_GLOB" \
            --csv tables/timing_summary.csv \
            --markdown tables/timing_summary.md \
            --latex tables/timing_summary.tex

      - name: Upload generated tables as artifact
        uses: actions/upload-artifact@v4
        with:
          name: curated-timing-tables
          path: |
            tables/timing_summary.csv
            tables/timing_summary.md
            tables/timing_summary.tex
          if-no-files-found: error

      - name: Commit generated tables
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tables/timing_summary.csv tables/timing_summary.md tables/timing_summary.tex
          if git diff --cached --quiet; then
            echo "No table changes to commit."
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          git push
