name: Docker build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: Build auditor image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dataset-timekeeping-auditor:ci .

      - name: Run smoke test inside container
        run: |
          mkdir -p results-ci
          docker run --rm \
            -v "$PWD/examples:/work/examples:ro" \
            -v "$PWD/results-ci:/work/results" \
            dataset-timekeeping-auditor:ci \
            python -m dataset_time_auditor.audit_docs \
              /work/examples/example_dataset_readme.txt \
              --dataset example_docs_docker \
              --output /work/results/example_docs_docker.json
