# Candidate registry for the dataset timekeeping survey.
# Goal: keep raw downloads small. Use L0 documentation audits first, then L1 on one small sample.
# audit_level_target:
#   L0 = documentation/README/paper only
#   L1 = metadata or one sample sequence
#   L2 = full representative sequence

candidates:
  - id: ar_table
    name: AR Table Dataset
    tier: 1
    domain: indoor_visual_inertial_rgbd
    mass_relevance: low
    format_expected: ros1_bag
    audit_level_target: L1
    download_policy: one_small_bag
    sensors_expected: [rgbd_camera, imu]
    candidate_urls:
      - https://github.com/rpng/ar_table_dataset
    timing_questions:
      - real_sense_header_stamp_vs_bag_record_time
      - imu_camera_timestamp_alignment
      - whether_clock_source_is_documented
    status: candidate

